<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #f4f4f8; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
.row { display: flex; align-items: center; gap: 10px; }
.bar { background: #204160; border-radius: 4px; height: 100%; }
.label { font-size: 10px; font-weight: 600; color: #5e5e6e; letter-spacing: 0.08em; text-transform: uppercase; min-width: 52px; }
.val { font-size: 10px; color: #a4a4b4; min-width: 32px; }
.bar-wrap { flex: 1; background: #e4e4ec; border-radius: 4px; height: 10px; overflow: hidden; }
</style>
</head><body>
<div style="font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:#7e7e8e">Spacing Scale</div>
<div class="row"><span class="label">space-1</span><div class="bar-wrap"><div class="bar" style="width:4px"></div></div><span class="val">4px</span></div>
<div class="row"><span class="label">space-2</span><div class="bar-wrap"><div class="bar" style="width:8px"></div></div><span class="val">8px</span></div>
<div class="row"><span class="label">space-3</span><div class="bar-wrap"><div class="bar" style="width:12px"></div></div><span class="val">12px</span></div>
<div class="row"><span class="label">space-4</span><div class="bar-wrap"><div class="bar" style="width:16px"></div></div><span class="val">16px</span></div>
<div class="row"><span class="label">space-5</span><div class="bar-wrap"><div class="bar" style="width:20px"></div></div><span class="val">20px</span></div>
<div class="row"><span class="label">space-6</span><div class="bar-wrap"><div class="bar" style="width:24px"></div></div><span class="val">24px</span></div>
<div class="row"><span class="label">space-8</span><div class="bar-wrap"><div class="bar" style="width:32px"></div></div><span class="val">32px</span></div>
<div class="row"><span class="label">space-10</span><div class="bar-wrap"><div class="bar" style="width:40px"></div></div><span class="val">40px</span></div>
<div class="row"><span class="label">space-12</span><div class="bar-wrap"><div class="bar" style="width:48px"></div></div><span class="val">48px</span></div>
<div class="row"><span class="label">space-16</span><div class="bar-wrap"><div class="bar" style="width:64px"></div></div><span class="val">64px</span></div>
<div class="row"><span class="label">space-20</span><div class="bar-wrap"><div class="bar" style="width:80px"></div></div><span class="val">80px</span></div>
<div class="row"><span class="label">space-24</span><div class="bar-wrap"><div class="bar" style="width:96px"></div></div><span class="val">96px</span></div>
</body></html>
