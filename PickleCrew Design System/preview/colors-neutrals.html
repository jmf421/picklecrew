<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #f4f4f8; padding: 16px; }
.row { display: flex; gap: 6px; }
.swatch { flex: 1; border-radius: 8px; height: 72px; display: flex; flex-direction: column; justify-content: flex-end; padding: 6px 8px; }
.swatch small { font-size: 10px; font-weight: 600; opacity: 0.85; }
.swatch span { font-size: 9px; opacity: 0.7; margin-top: 1px; }
.label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #5e5e6e; margin-bottom: 6px; }
</style>
</head><body>
<div class="label">Neutrals</div>
<div class="row">
  <div class="swatch" style="background:#0a0a0f"><small style="color:#fff">950</small><span style="color:#ffffff66">#0a0a0f</span></div>
  <div class="swatch" style="background:#111118"><small style="color:#fff">900</small><span style="color:#ffffff66">#111118</span></div>
  <div class="swatch" style="background:#1e1e28"><small style="color:#fff">800</small><span style="color:#ffffff66">#1e1e28</span></div>
  <div class="swatch" style="background:#2e2e3a"><small style="color:#fff">700</small><span style="color:#ffffff66">#2e2e3a</span></div>
  <div class="swatch" style="background:#42424f"><small style="color:#fff">600</small><span style="color:#ffffff66">#42424f</span></div>
  <div class="swatch" style="background:#5e5e6e"><small style="color:#fff">500</small><span style="color:#ffffff66">#5e5e6e</span></div>
  <div class="swatch" style="background:#7e7e8e"><small style="color:#fff">400</small><span style="color:#ffffff66">#7e7e8e</span></div>
  <div class="swatch" style="background:#a4a4b4"><small style="color:#fff">300</small><span style="color:#ffffff66">#a4a4b4</span></div>
  <div class="swatch" style="background:#c8c8d4"><small style="color:#333">200</small><span style="color:#33333366">#c8c8d4</span></div>
  <div class="swatch" style="background:#e4e4ec; border:1px solid #d4d4e0"><small style="color:#333">100</small><span style="color:#33333366">#e4e4ec</span></div>
  <div class="swatch" style="background:#f4f4f8; border:1px solid #e4e4ec"><small style="color:#333">50</small><span style="color:#33333366">#f4f4f8</span></div>
  <div class="swatch" style="background:#ffffff; border:1px solid #e4e4ec"><small style="color:#333">White</small><span style="color:#33333366">#ffffff</span></div>
</div>
</body></html>
