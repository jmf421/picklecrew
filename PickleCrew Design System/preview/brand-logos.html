<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #f4f4f8; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
.logo-box { border-radius: 12px; padding: 20px 28px; display: flex; align-items: center; justify-content: center; }
.label { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #7e7e8e; margin-bottom: 6px; }
.row { display: flex; gap: 10px; }
</style>
</head><body>
<div class="label">Logo — Dark (on white)</div>
<div class="logo-box" style="background:#fff; border:1px solid #e4e4ec">
  <img src="../assets/logo-dark.png" style="height:48px; max-width:100%">
</div>
<div class="label">Logo — Light (on navy)</div>
<div class="logo-box" style="background:#204160">
  <img src="../assets/logo-light.png" style="height:48px; max-width:100%">
</div>
<div class="label">Logo — on dark bg</div>
<div class="logo-box" style="background:#0d1b29">
  <img src="../assets/logo-light.png" style="height:48px; max-width:100%">
</div>
<div class="label">Tagline</div>
<div style="padding: 8px 0; font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:700; letter-spacing:0.15em; text-transform:uppercase; color:#7e7e8e">
  YOUR PICKLEBALL CREW, LEVELED UP
</div>
</body></html>
