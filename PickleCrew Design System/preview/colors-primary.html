<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #f4f4f8; padding: 16px; }
.row { display: flex; gap: 6px; margin-bottom: 6px; }
.swatch { flex: 1; border-radius: 8px; height: 64px; display: flex; flex-direction: column; justify-content: flex-end; padding: 6px 8px; position: relative; }
.swatch small { font-size: 10px; font-weight: 600; opacity: 0.85; }
.swatch span { font-size: 9px; opacity: 0.7; margin-top: 1px; }
.label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #5e5e6e; margin-bottom: 6px; }
</style>
</head><body>
<div class="label">Navy</div>
<div class="row">
  <div class="swatch" style="background:#0d1b29"><small style="color:#fff">950</small><span style="color:#ffffff88">#0d1b29</span></div>
  <div class="swatch" style="background:#102135"><small style="color:#fff">900</small><span style="color:#ffffff88">#102135</span></div>
  <div class="swatch" style="background:#162d47"><small style="color:#fff">800</small><span style="color:#ffffff88">#162d47</span></div>
  <div class="swatch" style="background:#1c3858"><small style="color:#fff">700</small><span style="color:#ffffff88">#1c3858</span></div>
  <div class="swatch" style="background:#204160"><small style="color:#fff">600 ★</small><span style="color:#ffffff88">#204160</span></div>
  <div class="swatch" style="background:#2b5580"><small style="color:#fff">500</small><span style="color:#ffffff88">#2b5580</span></div>
  <div class="swatch" style="background:#3d6f9e"><small style="color:#fff">400</small><span style="color:#ffffff88">#3d6f9e</span></div>
  <div class="swatch" style="background:#6191b8"><small style="color:#fff">300</small><span style="color:#ffffff88">#6191b8</span></div>
  <div class="swatch" style="background:#93b5cf"><small style="color:#333">200</small><span style="color:#33333388">#93b5cf</span></div>
  <div class="swatch" style="background:#c4d8e8"><small style="color:#333">100</small><span style="color:#33333388">#c4d8e8</span></div>
  <div class="swatch" style="background:#e8f1f8; border:1px solid #dde7f0"><small style="color:#333">50</small><span style="color:#33333388">#e8f1f8</span></div>
</div>

<div class="label" style="margin-top:8px">Blue — Accent</div>
<div class="row">
  <div class="swatch" style="background:#0d4d80"><small style="color:#fff">900</small><span style="color:#ffffff88">#0d4d80</span></div>
  <div class="swatch" style="background:#1163a3"><small style="color:#fff">800</small><span style="color:#ffffff88">#1163a3</span></div>
  <div class="swatch" style="background:#1577c2"><small style="color:#fff">700</small><span style="color:#ffffff88">#1577c2</span></div>
  <div class="swatch" style="background:#1a88d8"><small style="color:#fff">600</small><span style="color:#ffffff88">#1a88d8</span></div>
  <div class="swatch" style="background:#2090d0"><small style="color:#fff">500 ★</small><span style="color:#ffffff88">#2090d0</span></div>
  <div class="swatch" style="background:#3aa8e0"><small style="color:#fff">400</small><span style="color:#ffffff88">#3aa8e0</span></div>
  <div class="swatch" style="background:#6cc0ec"><small style="color:#333">300</small><span style="color:#33333388">#6cc0ec</span></div>
  <div class="swatch" style="background:#9fd6f4"><small style="color:#333">200</small><span style="color:#33333388">#9fd6f4</span></div>
  <div class="swatch" style="background:#ceeaf9"><small style="color:#333">100</small><span style="color:#33333388">#ceeaf9</span></div>
  <div class="swatch" style="background:#e8f5fd; border:1px solid #d0eaf8"><small style="color:#333">50</small><span style="color:#33333388">#e8f5fd</span></div>
</div>
</body></html>
