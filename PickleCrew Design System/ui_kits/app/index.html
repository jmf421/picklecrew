<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PickleCrew — Mobile App UI Kit</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
  html, body { height: 100%; background: #0d1b29; font-family: 'Inter', sans-serif; }
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }

  /* Phone frame */
  .phone-wrap { display: flex; flex-direction: column; align-items: center; gap: 20px; }
  .phone-frame {
    width: 390px; height: 780px;
    background: #fff; border-radius: 44px;
    border: 8px solid #1a2a3a;
    box-shadow: 0 32px 80px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,255,255,0.08);
    overflow: hidden; display: flex; flex-direction: column; position: relative;
  }
  /* Notch */
  .status-bar {
    height: 44px; background: #204160; display: flex; align-items: flex-end;
    padding: 0 24px 8px; justify-content: space-between; flex-shrink: 0;
  }
  .notch {
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 120px; height: 32px; background: #1a2a3a; border-radius: 0 0 20px 20px;
    z-index: 10;
  }
  .status-time { font-size: 12px; font-weight: 700; color: #fff; font-family: 'Inter', sans-serif; }
  .status-icons { display: flex; gap: 5px; align-items: center; }
  .status-icons svg { opacity: 0.9; }

  /* App content area */
  .app-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

  /* Screen navigator info */
  .screen-label {
    background: rgba(13,27,41,0.85); color: #93b5cf;
    font-size: 11px; font-weight: 600; font-family: 'Inter', sans-serif;
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 6px 14px; border-radius: 9999px;
    backdrop-filter: blur(8px);
  }

  /* Tweaks panel */
  #tweaks-panel {
    display: none; position: fixed; bottom: 20px; right: 20px;
    background: #0d1b29; border: 1px solid #162d47;
    border-radius: 16px; padding: 16px; width: 220px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5); z-index: 1000; font-family: 'Inter', sans-serif;
  }
  #tweaks-panel h3 { color: #fff; font-size: 13px; font-weight: 700; margin-bottom: 12px; }
  .tweak-row { margin-bottom: 10px; }
  .tweak-row label { display: block; font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #6191b8; margin-bottom: 4px; }
  .tweak-btn-row { display: flex; gap: 4px; }
  .tweak-btn { flex: 1; padding: 5px; border-radius: 6px; border: 1px solid #204160; background: transparent; color: #93b5cf; font-size: 11px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; }
  .tweak-btn.active { background: #2090d0; border-color: #2090d0; color: #fff; }
  .tweak-toggle { width: 100%; padding: 6px; border-radius: 6px; border: 1px solid #204160; background: transparent; color: #93b5cf; font-size: 11px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; text-align: left; }
  .tweak-toggle.on { background: #162d47; color: #fff; border-color: #3d6f9e; }
</style>
</head>
<body>

<div id="root"></div>

<div id="tweaks-panel">
  <h3>Tweaks</h3>
  <div class="tweak-row">
    <label>Theme</label>
    <div class="tweak-btn-row">
      <button class="tweak-btn active" id="tweak-light" onclick="setTheme('light')">Light</button>
      <button class="tweak-btn" id="tweak-dark" onclick="setTheme('dark')">Dark</button>
    </div>
  </div>
  <div class="tweak-row">
    <label>Start Screen</label>
    <div class="tweak-btn-row" style="flex-wrap:wrap; gap:4px">
      <button class="tweak-btn active" id="ss-home" onclick="setStartScreen('home')">Home</button>
      <button class="tweak-btn" id="ss-groups" onclick="setStartScreen('groups')">Groups</button>
      <button class="tweak-btn" id="ss-log" onclick="setStartScreen('log')">Log</button>
      <button class="tweak-btn" id="ss-profile" onclick="setStartScreen('profile')">Profile</button>
    </div>
  </div>
</div>

<script type="text/babel" src="Components.jsx"></script>
<script type="text/babel" src="Screens.jsx"></script>
<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{"theme":"light","startScreen":"home"}/*EDITMODE-END*/;

function App() {
  const saved = (() => { try { return JSON.parse(localStorage.getItem('pc_nav') || 'null'); } catch(e){ return null; } })();
  const [screen, setScreen] = React.useState(saved || TWEAK_DEFAULTS.startScreen);
  const [theme, setThemeState] = React.useState(TWEAK_DEFAULTS.theme);
  const [selectedGroup, setSelectedGroup] = React.useState(null);

  React.useEffect(() => { localStorage.setItem('pc_nav', JSON.stringify(screen)); }, [screen]);

  // Expose setters for tweaks
  React.useEffect(() => {
    window.__appSetScreen = setScreen;
    window.__appSetTheme = setThemeState;
  }, []);

  const isDark = theme === 'dark';
  const bgColor = isDark ? '#0d1b29' : '#f4f4f8';

  const handleNav = (id) => {
    if (id === 'log') { setScreen('log'); return; }
    setSelectedGroup(null);
    setScreen(id);
  };

  const appBarBg = isDark ? '#102135' : '#204160';
  const screenTitles = { home:'Home', groups:'Groups', events:'Events', profile:'Profile', log:'Log Game', activity:'Activity', groupDetail:'Group Detail' };

  return (
    <div className="phone-wrap">
      <div className="phone-frame" style={{background: bgColor}}>
        <div className="notch"/>
        {/* Status bar */}
        <div className="status-bar" style={{background: appBarBg}}>
          <span className="status-time" style={{paddingTop:4}}>9:41</span>
          <div className="status-icons">
            <svg width="15" height="11" viewBox="0 0 15 11" fill="white"><rect x="0" y="3" width="3" height="8" rx="1"/><rect x="4" y="2" width="3" height="9" rx="1"/><rect x="8" y="0" width="3" height="11" rx="1"/><rect x="12" y="1" width="3" height="10" rx="1" opacity="0.4"/></svg>
            <svg width="14" height="11" viewBox="0 0 14 11" fill="white"><path d="M7 2.5C9.2 2.5 11.2 3.4 12.6 4.9L14 3.4C12.2 1.3 9.7 0 7 0S1.8 1.3 0 3.4L1.4 4.9C2.8 3.4 4.8 2.5 7 2.5z" opacity="0.4"/><path d="M7 5.5C8.5 5.5 9.8 6.1 10.8 7.1L12.2 5.6C10.8 4.1 9 3.2 7 3.2S3.2 4.1 1.8 5.6L3.2 7.1C4.2 6.1 5.5 5.5 7 5.5z"/><circle cx="7" cy="9.5" r="1.5"/></svg>
            <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0" y="1" width="21" height="10" rx="2.5" stroke="white" strokeWidth="1.2" opacity="0.5"/><rect x="1.5" y="2.5" width="15" height="7" rx="1.5" fill="white"/><path d="M22.5 4.5v3a1.5 1.5 0 000-3z" fill="white" opacity="0.5"/></svg>
          </div>
        </div>

        {/* App bar */}
        <div style={{height:50, background:appBarBg, display:'flex', alignItems:'center', padding:'0 10px', gap:8, flexShrink:0}}>
          {(screen==='groupDetail') && (
            <button onClick={()=>{setScreen('groups');setSelectedGroup(null);}} style={{width:36,height:36,borderRadius:'50%',border:'none',background:'rgba(255,255,255,0.12)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',flexShrink:0}}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
          )}
          {screen !== 'groupDetail' && <div style={{width:36,flexShrink:0}}/>}
          <div style={{flex:1,textAlign:'center',fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,fontWeight:700,letterSpacing:'0.05em',textTransform:'uppercase',color:'#fff'}}>
            {screen==='groupDetail' && selectedGroup ? selectedGroup.name : screenTitles[screen] || 'PickleCrew'}
          </div>
          <button style={{width:36,height:36,borderRadius:'50%',border:'none',background:'rgba(255,255,255,0.12)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',position:'relative'}}>
            <BellIcon size={17} color="#fff"/>
            <div style={{position:'absolute',top:7,right:7,width:6,height:6,borderRadius:'50%',background:'#f55a20',border:'1.5px solid '+appBarBg}}/>
          </button>
        </div>

        {/* Screen content */}
        <div className="app-content" style={{background:bgColor}}>
          {screen==='home' && <HomeScreen onNav={handleNav}/>}
          {screen==='groups' && !selectedGroup && <GroupsScreen onSelect={(g)=>{setSelectedGroup(g);setScreen('groupDetail');}}/>}
          {screen==='groupDetail' && selectedGroup && <GroupDetailScreen group={selectedGroup} onBack={()=>{setScreen('groups');setSelectedGroup(null);}}/>}
          {screen==='log' && <LogGameScreen onBack={()=>setScreen('home')} onSubmit={()=>{}}/>}
          {screen==='profile' && <ProfileScreen/>}
          {screen==='events' && <ActivityScreen/>}
        </div>

        {/* Bottom nav (hidden on log screen) */}
        {screen !== 'log' && (
          <BottomNav active={screen==='groupDetail'?'groups':screen} onNav={handleNav}/>
        )}
      </div>

      <div className="screen-label">
        {screenTitles[screen] || 'PickleCrew'} · tap nav to explore
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

// Tweaks integration
window.addEventListener('message', e => {
  if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaks-panel').style.display = 'block';
  if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').style.display = 'none';
});
window.parent.postMessage({type:'__edit_mode_available'},'*');

function setTheme(t) {
  document.querySelectorAll('[id^="tweak-light"],[id^="tweak-dark"]').forEach(b=>b.classList.remove('active'));
  document.getElementById('tweak-'+t)?.classList.add('active');
  window.__appSetTheme?.(t);
  window.parent.postMessage({type:'__edit_mode_set_keys', edits:{theme:t}},'*');
}
function setStartScreen(s) {
  document.querySelectorAll('[id^="ss-"]').forEach(b=>b.classList.remove('active'));
  document.getElementById('ss-'+s)?.classList.add('active');
  window.__appSetScreen?.(s);
  window.parent.postMessage({type:'__edit_mode_set_keys', edits:{startScreen:s}},'*');
}
</script>
</body>
</html>
